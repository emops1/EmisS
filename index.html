<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Zyroo | License Auth Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050816;
      --card-bg: #0b1020;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f87171;
      --success: #4ade80;
      --border: rgba(148, 163, 184, 0.25);
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 24px 80px rgba(15, 23, 42, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937 0, transparent 50%),
                  radial-gradient(circle at bottom, #020617 0, #020617 55%, #000 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .glow-orbit {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .glow-orbit::before,
    .glow-orbit::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
    }

    .glow-orbit::before {
      top: -120px;
      left: -80px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.9), transparent 60%);
    }

    .glow-orbit::after {
      bottom: -140px;
      right: -100px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.9), transparent 60%);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top left, rgba(148, 163, 184, 0.1), transparent 50%),
                  radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.98));
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      padding: 28px 26px 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(148, 163, 184, 0.12), transparent 55%);
      opacity: 0.8;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.4);
    }

    .header {
      margin-top: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 12px;
      background: radial-gradient(circle at 30% 20%, #4f46e5, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.8);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .title {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .input-wrapper {
      display: flex;
      align-items: stretch;
      gap: 8px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 999px;
      padding: 2px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      box-shadow: inset 0 0 0 0.5px rgba(148, 163, 184, 0.3);
    }

    .input-prefix {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border-right: 1px solid rgba(30, 64, 175, 0.6);
    }

    .input-prefix span {
      color: var(--accent);
      font-weight: 500;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 10px 6px 10px 0;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }

    .button-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
      gap: 10px;
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      box-shadow: 0 14px 30px rgba(79, 70, 229, 0.55);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      flex-shrink: 0;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(79, 70, 229, 0.7);
      background: linear-gradient(135deg, #6366f1, #818cf8);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.5);
    }

    .button-icon {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(219, 234, 254, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .status-row {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.5);
    }

    .status-light {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.4);
    }

    .status-light.ok {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.4);
    }

    .status-message {
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }

    .status-message.error {
      color: #fecaca;
    }

    .status-message.success {
      color: #bbf7d0;
    }

    .keys-hint {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px dashed rgba(148, 163, 184, 0.3);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .keys-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .key-chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .footer {
      margin-top: 16px;
      font-size: 10px;
      color: rgba(148, 163, 184, 0.7);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .footer span {
      white-space: nowrap;
    }

    .footer-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(75, 85, 99, 0.7), transparent);
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 20px;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orbit"></div>
  <main class="card">
    <div class="card-inner">
      <div class="badge">
        <span class="dot"></span>
        <span>License Authentication</span>
      </div>

      <header class="header">
        <div class="brand">
          <div class="brand-mark">Z</div>
          <div class="brand-text">
            <span class="brand-title">Zyroo</span>
            <span class="brand-sub">Secure Access Gateway</span>
          </div>
        </div>

        <h1 class="title">Zyroo License</h1>
        <p class="subtitle">Dashboard'a erişmek için lisans anahtarınızı girin.</p>
      </header>

      <form id="license-form">
        <div>
          <label class="field-label" for="license">License key</label>
          <div class="input-wrapper">
            <div class="input-prefix">
              KEY <span>●●●●</span>
            </div>
            <input
              id="license"
              type="text"
              autocomplete="off"
              placeholder="A7FF-8A80-CB97-9892"
              maxlength="19"
            />
          </div>
        </div>

        <div class="button-row">
          <button type="submit">
            <span>Authenticate</span>
            <span class="button-icon">→</span>
          </button>
        </div>

        <div class="status-row">
          <div class="status-pill">
            <span id="status-light" class="status-light"></span>
            <span id="status-text">Waiting for license</span>
          </div>
          <span>Dashboard access: <strong id="status-access">Locked</strong></span>
        </div>

        <p id="status-message" class="status-message"></p>

        <div class="keys-hint">
          <span>Kullanılabilir test lisansları:</span>
          <div class="keys-grid" id="keys-grid"></div>
        </div>
      </form>

      <div class="footer">
        <span>Local demo clone</span>
        <div class="footer-divider"></div>
        <span>zyroo auth ui</span>
      </div>
    </div>
  </main>

  <script>
    // Örnek geçerli lisans anahtarları listesi
    const VALID_KEYS = [
      "A7FF-8A80-CB97-9892",
      "B3C1-2D45-EF67-8890",
      "C9AA-1B23-DE45-6678",
      "D1F2-3A56-BC78-9012",
      "ZYR0-0X1A-2B3C-4D5E"
    ];

    const form = document.getElementById("license-form");
    const input = document.getElementById("license");
    const statusLight = document.getElementById("status-light");
    const statusText = document.getElementById("status-text");
    const statusAccess = document.getElementById("status-access");
    const statusMessage = document.getElementById("status-message");
    const keysGrid = document.getElementById("keys-grid");

    // Test anahtarlarını ekranda göster
    VALID_KEYS.forEach((key) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "key-chip";
      chip.textContent = key;
      chip.addEventListener("click", () => {
        input.value = key;
        input.focus();
      });
      keysGrid.appendChild(chip);
    });

    // Input'u XXXX-XXXX-XXXX-XXXX formatında otomatik gruplama
    input.addEventListener("input", (e) => {
      let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      const groups = [];
      for (let i = 0; i < value.length && groups.length < 4; i += 4) {
        groups.push(value.slice(i, i + 4));
      }
      e.target.value = groups.join("-").slice(0, 19);
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const license = input.value.trim().toUpperCase();

      if (!license) {
        updateStatus("Lisans anahtarı boş olamaz.", false);
        return;
      }

      const isValid = VALID_KEYS.includes(license);

      if (!isValid) {
        updateStatus("Geçersiz lisans anahtarı. Lütfen tekrar deneyin.", false);
        return;
      }

      updateStatus("Lisans doğrulandı. Dashboard'a yönlendiriliyorsunuz...", true);

      // Basit demo: dashboard.html'e yönlen
      setTimeout(() => {
        const url = new URL(window.location.href);
        url.pathname = url.pathname.replace(/[^\/]+$/, "dashboard.html");
        window.location.href = url.toString();
      }, 800);
    });

    function updateStatus(message, ok) {
      statusLight.classList.toggle("ok", ok);
      statusText.textContent = ok ? "License verified" : "License invalid";
      statusAccess.textContent = ok ? "Granted" : "Locked";
      statusMessage.textContent = message;
      statusMessage.className = "status-message " + (ok ? "success" : "error");
    }
  </script>
</body>
</html>
